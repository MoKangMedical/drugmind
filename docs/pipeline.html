<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>研发流程 — DrugMind</title>
<meta name="description" content="DrugMind药物研发数字孪生：交互式5段Pipeline流程可视化。">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#06080d;--card:#0f141c;--border:#1e2736;--text:#e8edf5;--text2:#8896b0;--accent:#3b82f6;--green:#10b981;--purple:#8b5cf6;--gold:#f59e0b;--radius:14px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);line-height:1.7}
.container{max-width:1100px;margin:0 auto;padding:0 24px}
.nav{background:rgba(6,8,13,0.95);border-bottom:1px solid var(--border);padding:0 24px;position:sticky;top:0;z-index:100}
.nav-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:56px}
.nav-brand{display:flex;align-items:center;gap:10px;font-weight:700}
.nav-links{display:flex;gap:24px}
.nav-links a{color:var(--text2);font-size:13px;text-decoration:none;transition:color 0.2s}
.nav-links a:hover{color:var(--accent)}
.hero{padding:100px 0 40px;text-align:center}
.hero h1{font-size:clamp(2rem,4vw,3rem);font-weight:900;margin-bottom:8px}
.hero p{color:var(--text2);font-size:1.1rem;max-width:600px;margin:0 auto}
.pipeline{display:flex;gap:0;margin:40px 0;overflow-x:auto;padding:20px 0}
.pipe-step{flex:1;min-width:180px;position:relative;cursor:pointer;transition:all 0.3s}
.pipe-step:hover .pipe-card{border-color:var(--accent);transform:translateY(-4px)}
.pipe-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;text-align:center;transition:all 0.3s}
.pipe-num{width:36px;height:36px;border-radius:50%;background:var(--accent);color:white;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;margin:0 auto 12px}
.pipe-card h3{font-size:14px;font-weight:700;margin-bottom:6px}
.pipe-card p{font-size:12px;color:var(--text2)}
.pipe-connector{width:40px;display:flex;align-items:center;justify-content:center;color:var(--accent);font-size:20px;flex-shrink:0}
.detail-panel{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:32px;margin:20px 0;display:none}
.detail-panel.active{display:block;animation:fadeIn 0.3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.detail-header{display:flex;align-items:center;gap:16px;margin-bottom:20px}
.detail-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px}
.detail-header h2{font-size:1.3rem;font-weight:800}
.detail-header p{color:var(--text2);font-size:14px}
.detail-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:16px;margin:20px 0}
.detail-item{background:var(--bg);border-radius:10px;padding:16px}
.detail-item h4{font-size:13px;font-weight:700;margin-bottom:8px}
.detail-item p{font-size:13px;color:var(--text2)}
.agents{margin:20px 0}
.agent-card{display:flex;gap:16px;padding:16px;background:var(--bg);border-radius:10px;margin-bottom:12px;align-items:center}
.agent-avatar{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
.agent-info h4{font-size:14px;font-weight:700}
.agent-info p{font-size:12px;color:var(--text2)}
.metrics-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:20px 0}
.metric{background:var(--bg);border-radius:10px;padding:14px;text-align:center}
.metric .val{font-size:1.3rem;font-weight:900}
.metric .label{font-size:11px;color:var(--text2)}
@media(max-width:768px){.pipeline{flex-direction:column;align-items:center}.pipe-connector{transform:rotate(90deg)}.metrics-row{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<nav class="nav"><div class="nav-inner">
<a href="index.html" class="nav-brand">💊 DrugMind</a>
<div class="nav-links"><a href="index.html">首页</a><a href="pricing.html">定价</a><a href="https://github.com/MoKangMedical/drugmind">GitHub</a></div>
</div></nav>

<div class="container">
<div class="hero">
<h1>药物研发数字孪生</h1>
<p>点击每个阶段查看详细流程、AI Agent和关键指标</p>
</div>

<div class="pipeline">
<div class="pipe-step" onclick="showDetail(0)"><div class="pipe-card"><div class="pipe-num">1</div><h3>靶点发现</h3><p>基因组学+文献挖掘</p></div></div>
<div class="pipe-connector">→</div>
<div class="pipe-step" onclick="showDetail(1)"><div class="pipe-card"><div class="pipe-num">2</div><h3>先导化合物</h3><p>虚拟筛选+分子生成</p></div></div>
<div class="pipe-connector">→</div>
<div class="pipe-step" onclick="showDetail(2)"><div class="pipe-card"><div class="pipe-num">3</div><h3>ADMET优化</h3><p>性质预测+多目标优化</p></div></div>
<div class="pipe-connector">→</div>
<div class="pipe-step" onclick="showDetail(3)"><div class="pipe-card"><div class="pipe-num">4</div><h3>临床前研究</h3><p>毒性预测+PK/PD建模</p></div></div>
<div class="pipe-connector">→</div>
<div class="pipe-step" onclick="showDetail(4)"><div class="pipe-card"><div class="pipe-num">5</div><h3>临床设计</h3><p>试验方案+患者分层</p></div></div>
</div>

<div class="detail-panel" id="detailPanel"></div>
</div>

<script>
const stages=[
{title:"靶点发现",icon:"🎯",color:"#3b82f6",desc:"从基因组学数据和海量文献中发现潜在药物靶点",
tools:[{name:"基因组分析",desc:"GWAS/eQTL数据挖掘，识别疾病相关基因变异"},{name:"文献知识图谱",desc:"PubMed/PMC全文挖掘，构建靶点-疾病关系网络"},{name:"蛋白质交互网络",desc:"STRING/BioGRID数据，识别关键Hub蛋白"},{name:"单细胞表达分析",desc:"scRNA-seq数据，识别细胞类型特异性靶点"}],
agents:[{name:"GeneMiner",icon:"🧬",role:"基因组数据挖掘Agent"},{name:"LitReader",icon:"📚",role:"文献智能阅读Agent"},{name:"NetAnalyzer",icon:"🕸️",role:"蛋白网络分析Agent"}],
metrics:[{val:"2,847",label:"候选靶点"},{val:"156",label:"高置信靶点"},{val:"89%",label:"覆盖率"},{val:"3.2s",label:"处理速度"}]},
{title:"先导化合物发现",icon:"💊",color:"#10b981",desc:"通过虚拟筛选和AI分子生成找到候选药物分子",
tools:[{name:"DrugCLIP虚拟筛选",desc:"CLIP架构，12数据集基准，95.3% AUC-ROC"},{name:"分子生成模型",desc:"基于Transformer的SMILES生成，约束优化"},{name:"分子对接",desc:"AutoDock Vina/Glide对接打分"},{name:"3D药效团模型",desc:"Pharmacophore-based筛选"}],
agents:[{name:"ScreenBot",icon:"🔍",role:"高通量筛选Agent"},{name:"MolGenerator",icon:"⚗️",role:"分子设计Agent"},{name:"DockMaster",icon:"🏗️",role:"分子对接Agent"}],
metrics:[{val:"10M+",label:"化合物库"},{val:"1,247",label:"命中化合物"},{val:"0.847",label:"Spearman ρ"},{val:"12min",label:"筛选时间"}]},
{title:"ADMET优化",icon:"⚡",color:"#f59e0b",desc:"优化药物分子的吸收、分布、代谢、排泄和毒性性质",
tools:[{name:"ADMET预测器",desc:"13个ADMET端点，图神经网络架构"},{name:"多目标优化",desc:"Pareto前沿搜索，活性-选择性-ADMET联合优化"},{name:"代谢位点预测",desc:"CYP450代谢位点预测，指导结构修饰"},{name:"溶解度优化",desc:"LogP/LogS预测，指导盐型选择"}],
agents:[{name:"ADMETPredictor",icon:"📊",role:"性质预测Agent"},{name:"OptiMol",icon:"🔧",role:"分子优化Agent"},{name:"ToxScreen",icon:"🛡️",role:"毒性筛查Agent"}],
metrics:[{val:"13",label:"ADMET端点"},{val:"0.891",label:"平均AUC"},{val:"85%",label:"优化成功率"},{val:"3轮",label:"平均迭代"}]},
{title:"临床前研究",icon:"🔬",color:"#8b5cf6",desc:"毒性预测、PK/PD建模、制剂开发",
tools:[{name:"毒性预测",desc:"hERG/肝毒性/基因毒性多终点预测"},{name:"PK/PD建模",desc:"群体药代动力学建模，剂量-效应关系"},{name:"制剂设计",desc:"纳米制剂/缓释制剂AI辅助设计"},{name:"生物标志物发现",desc:"伴随诊断标志物筛选"}],
agents:[{name:"ToxPredictor",icon:"☠️",role:"毒性预测Agent"},{name:"PKModeler",icon:"📈",role:"PK/PD建模Agent"},{name:"FormulaBot",icon:"💉",role:"制剂设计Agent"}],
metrics:[{val:"6",label:"毒性终点"},{val:"92%",label:"预测准确率"},{val:"0.85",label:"R² (PK)"},{val:"4周",label:"传统→1周"}]},
{title:"临床试验设计",icon:"📋",color:"#ec4899",desc:"临床试验方案设计、患者分层、终点选择",
tools:[{name:"试验方案设计",desc:"适应性设计/平台试验AI辅助设计"},{name:"患者分层",desc:"基于基因组和临床特征的精准入组"},{name:"终点选择",desc:"替代终点验证，加速审批路径"},{name:"样本量计算",desc:"贝叶斯自适应样本量估计"}],
agents:[{name:"TrialDesigner",icon:"📋",role:"试验设计Agent"},{name:"PatientStratifier",icon:"👥",role:"患者分层Agent"},{name:"RegulatoryBot",icon:"📜",role:"法规策略Agent"}],
metrics:[{val:"40%",label:"入组效率提升"},{val:"30%",label:"样本量节省"},{val:"2.5x",label:"成功率提升"},{val:"18月",label:"时间节省"}]}
];

function showDetail(idx){
const s=stages[idx];
const panel=document.getElementById('detailPanel');
panel.className='detail-panel active';
panel.innerHTML=`
<div class="detail-header">
<div class="detail-icon" style="background:${s.color}22;color:${s.color}">${s.icon}</div>
<div><h2>Stage ${idx+1}: ${s.title}</h2><p>${s.desc}</p></div>
</div>
<div class="metrics-row">${s.metrics.map(m=>`<div class="metric"><div class="val" style="color:${s.color}">${m.val}</div><div class="label">${m.label}</div></div>`).join('')}</div>
<h3 style="font-size:14px;font-weight:700;margin:20px 0 12px">🛠️ 核心工具</h3>
<div class="detail-grid">${s.tools.map(t=>`<div class="detail-item"><h4>${t.name}</h4><p>${t.desc}</p></div>`).join('')}</div>
<h3 style="font-size:14px;font-weight:700;margin:20px 0 12px">🤖 AI Agent</h3>
<div class="agents">${s.agents.map(a=>`<div class="agent-card"><div class="agent-avatar" style="background:${s.color}22">${a.icon}</div><div class="agent-info"><h4>${a.name}</h4><p>${a.role}</p></div></div>`).join('')}</div>
`;
panel.scrollIntoView({behavior:'smooth'});
}
showDetail(0);
</script>
</body>
</html>
