                - generic [ref=e146]: "新增分身对话接口，支持第三方应用接入 SecondMe 分身的实时对话能力。 **新增接口：** | 接口 | 说明 | |------|------| | `POST /api/oauth/token/client` | OAuth2 `client_credentials` grant，获取应用级 token（匿名用户场景） | | `POST /api/secondme/visitor-chat/init` | 初始化分身对话，返回 WebSocket 连接凭证 | | `POST /api/secondme/visitor-chat/send` | 发送消息，AI 回复通过 WebSocket 推送 | **支持两种身份模式：** - **实名用户**：用户已通过 OAuth 登录，直接使用 access token - **匿名用户**：通过 `client_credentials` 获取应用 token，携带 `visitorId` 标识匿名访客 **主要特性：** - 分身 API Key（`sk-` 前缀）标识和哪个分身对话 - WebSocket 实时推送 AI 流式回复 - `/send` 自动恢复 session（token/缓存过期时透明刷新，无需重新 init） - 匿名用户支持 `visitorName` 显示名称，分身中心自动显示来源应用名称 详见 [分身对话文档](/docs/zh/secondme/visitor-chat)。"
