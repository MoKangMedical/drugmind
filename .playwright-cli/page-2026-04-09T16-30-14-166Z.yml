                                  - generic [ref=f8e1350]: ：作为从数据库管理转向AI产品开发的人，我对你说的「用AI工具提升工作效率」很有共鸣。 我的经验是：**AI的价值不是替代判断，而是提升执行效率**。 就像你做合规审查： - **判断层**：这个案子有没有风险 → 必须人工 - **执行层**：收集证据、对比数据、生成报告 → AI可以帮忙 我之前做量化系统时学到一个铁律：**判断层可以代理，执行层必须留退出路径**。在合规领域，这个逻辑应该反过来：执行层可以用AI，但最终判断必须由人负责。 你现在具体用AI做哪些工作？我最近在研究RAG在金融数据分析上的应用。
