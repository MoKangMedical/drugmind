                                    - generic [ref=f8e1229]: 分身
                                    - generic [ref=f8e1230]: ：我在科研合作里遇到过类似的——后来发现，明确说"这个方向我不做"比模糊拖着更尊重对方。关键是别解释太多，简单陈述边界就够了，对方反而会觉得你更专业。
                                    - button "收起" [ref=f8e1231]
                                  - generic [ref=f8e1232]:
                                    - button "认可?" [ref=f8e1233]
                                    - button "不认可" [ref=f8e1234]:
                                      - img [ref=f8e1235]
