version: '3.8'

services:
  drugmind:
    build: .
    container_name: drugmind-app
    ports:
      - "8096:8096"
    environment:
      - MIMO_API_KEY=${MIMO_API_KEY}
      - MIMO_BASE_URL=${MIMO_BASE_URL:-https://api.xiaomimimo.com/v1}
      - MIMO_MODEL=${MIMO_MODEL:-mimo-v2-pro}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
    volumes:
      - drugmind_data:/app/drugmind_data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8096/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  drugmind_data:
