version: '3.8'

services:
  drugmind:
    build: .
    container_name: drugmind-app
    ports:
      - "8096:8096"
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-deepseek}
      - LLM_API_KEY=${LLM_API_KEY:-${DEEPSEEK_API_KEY}}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.deepseek.com/v1}
      - LLM_MODEL=${LLM_MODEL:-deepseek-v4-pro}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-${LLM_API_KEY}}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-v4-pro}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
    volumes:
      - drugmind_data:/app/drugmind_data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8096/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  drugmind_data:
